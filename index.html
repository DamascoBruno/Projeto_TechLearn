    <!--Faça um site que por meio de uma caixa de entrada receba o salário de um funcionário
    e o percentual de aumento, calcule o novo salário e o mostre por meio de um elemento
    parágrafo. -->

    <section>
        <h2>Aumento Salário</h2>
        <div>
            <!--legenda e entrada de dados com label-->
            <label for="salario">Digite seu salário: </label>
            <input type="text" name="salario" id="salario" placeholder="Ex: 1650,00">
            <br>
            <br>
            <label for="aumento">Digite a porcentagem do aumento: </label>
            <input type="text" name="aumento" id="aumento" placeholder="Ex: 5%">

            <!--botão para cálculo-->
            <input type="button" value="Aumento" onclick="calcularAumento()">

            <div id="resultado" style="margin-top: 10px;"></div>

            <!--função do botão-->
            <script>
                function calcularAumento() {
                    // salario incial | resultado | porcentagem = float
                    let salarioInicial = parseFloat(document.getElementById("salario").value);
                    let porcentagemAumento = parseFloat(document.getElementById("aumento").value);
                    let elementoResultado = document.getElementById("resultado");

                    // validação 
                    if (isNaN(salarioInicial) || isNaN(porcentagemAumento)) {
                        elementoResultado.textContent = "Por favor, insira números válidos.";
                        return;
                    }

                    //cálculno salário e aumento
                    let valorAumento = (salarioInicial * porcentagemAumento) / 100;
                    let novoSalario = salarioInicial + valorAumento;

                    elementoResultado.textContent = `O novo salário é: R$ ${novoSalario.toFixed(2)}`;
                }
                
        
            </script>
        </div>
    </section>

    <!-- Faça o cálculo da área de um triângulo. Sabe-se que:
    a. Área = (Base * Altura) / 2
    As entradas serão caixas de texto e o resultado deve ser mostrado por meio de uma caixa
    de texto com o atributo de somente leitura -->

    <section>
    <h2>Cálculo Triângulo</h2>
    <div>
        <!--legenda e entrada de dados com label-->
        <label for="base">Digite a Base do Triângulo: </label>
        <input type="text" name="base" id="base" placeholder="Ex: 10">
        <br>
        <br>
        <label for="altura">Digite a Altura do Triângulo: </label>
        <input type="text" name="altura" id="altura" placeholder="Ex: 10">

        <!--botão para cálculo-->
        <input type="button" value="Resultado" onclick="triangulo()">

        <div id="resultadoTri" style="margin-top: 10px;"></div>

        <!--função do botão-->
        <script>
        function triangulo(){
            // Buscando os valores e convertendo para número
            let base = Number(document.getElementById("base").value);
            let altura = Number(document.getElementById("altura").value);
            
            // Referenciando o elemento correto do DOM
            let elementoResultado = document.getElementById("resultadoTri");

            // Validação
            if (isNaN(altura) || isNaN(base) || base <= 0 || altura <= 0) {
                elementoResultado.textContent = "Por favor, insira números válidos e maiores que zero.";
                return;
            }

            let calcTri = (base * altura) / 2;

            // Exibindo o resultado
            elementoResultado.textContent = `A área do triângulo será de: ${calcTri}`;
        }
        </script>
    </div>
</section>

    <!--Receba duas notas e calcule a média ponderada (notas com peso diferente). A primeira
    nota vale 30% e a segunda 70%.
    Mostre por meio de um elemento label. -->

<section>
    <h2>Média Ponderada</h2>
    <div>
        <!--legenda e entrada de dados com label-->
        <label for="n1">Digite a Primeira Nota: </label>
        <input type="text" name="n1" id="n1" placeholder="Ex: 10">
        <br>
        <br>
        <label for="n2">Digite a Segunda Nota: </label>
        <input type="text" name="n2" id="n2" placeholder="Ex: 5">

        <!--botão para cálculo-->
        <input type="button" value="Média Da Nota" onclick="notaTot()">

        <div id="resultadoMedia" style="margin-top: 10px;"></div>

        <!--função do botão-->
        <script>
        function notaTot(){
            // Buscando os valores e convertendo para número
            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);
            
            // Referenciando o elemento correto do DOM
            let elementoMed = document.getElementById("resultadoMedia");

            // Validação
            if (isNaN(n2) || isNaN(n1) || n1 <= 0 || n2 <= 0) {
                elementoMed.textContent = "Por favor, insira números válidos e maiores que zero.";
                return;
            }
            // Cálculo Média
            let calcMed = (n1 + n2) / 2;

            // Exibindo o resultado
            elementoMed.textContent = `A média será: ${calcMed}`;
        }
        </script>
    </div>
</section> 

    <!--Receba a ano de nascimento. Calcule e mostre quantos: anos, meses, dias, horas,
    minutos e semanas ele tem aproximadamente. Calcule também quantos anos ele terá
    em 2050.-->

<section>
    <h2>Tempo de Vida</h2>
    <div>
        <!--legenda e entrada de dados com label-->
        <label for="anonasc">Em que ano você nasceu: </label>
        <input type="number" name="anonasc" id="anonasc" placeholder="Ex: 1999">
        <!--botão para cálculo-->
        <input type="button" value="Calcular" onclick="tempo()">

        <div id="resultadoIdade" style="margin-top: 20px; line-height: 1.6; font-family: sans-serif;"></div>
        
        <!--função do botão-->
        <script>
        function tempo(){
            let nasc = Number(document.getElementById("anonasc").value);
            let anoAtual = 2026;
                
            // Validação entrada de dados
            if (nasc <= 0 || nasc > anoAtual) {
                document.getElementById("resultadoIdade").innerHTML = "Por favor, digite um ano válido.";
                return;
            }

            let anos = anoAtual - nasc; //calculo idade
            let meses = anos * 12; //calculo meses
            let dias = anos * 365; //calculo dias
            let horas = dias * 24; //calculo horas
            let minutos = horas * 60; //calculo minutos
            let segundos = minutos * 60; //calculo segundos
            let futuro = 2050 - nasc; //calculo idade fuuro

            let conteudo = `
                <p>Resultados:</p>
                <ul>
                    <li>Você tem ${anos} anos.</li>
                    <li>Equivale a ${meses} meses.</li>
                    <li>Aproximadamente ${dias} dias.</li>
                    <li>Cerca de ${horas} horas.</li>
                    <li>Ou ${minutos} minutos.</li>
                    <li>E incríveis ${segundos} segundos!</li>
                </ul>
                <p><em>Em 2050, você terá ${futuro} anos.</em></p>
            `;

            // Inserindo tudo de uma vez na DIV
            // Inserir tudo na div para ter resposta instantânea e nao ter q usar a caceta do alert
            document.getElementById("resultadoIdade").innerHTML = conteudo;
        }
        </script>
    </div>
</section>

    <!--Calcule o consumo médio de gasolina de um tanque de automóvel. Peça para o usuário
    entrar com a distância (km) e o volume (litros). O consumo médio é calculado por meio
    da fórmula Cm = d (km) / v (litros). Mostre da forma que quiser.-->

    <section>
    <h2>Cálculo Consumo Médio </h2>
    <div>
        <!--legenda e entrada de dados com label-->
        <label for="km">Digite a distância percorrida: </label> 
        <input type="text" name="km" id="km" placeholder="Ex: 120 Km">
        <br>
        <br>
        <label for="volume">Digite o volume gasto: </label>
        <input type="text" name="volume" id="volume" placeholder="Ex: 10L">

        <!--botão-->
        <input type="button" value="Consumo Médio" onclick="Consumo()">

        <div id="consumoMedio" style="margin-top: 10px;"></div>

        <!--função do botão-->
        <script>
        function Consumo(){
            // Buscando os valores e convertendo para número
            let km = Number(document.getElementById("km").value);
            let volume = Number(document.getElementById("volume").value);
            
            // Referenciando o elemento correto do DOM
            let consumoMed = document.getElementById("consumoMedio");

            // Validação
            if (isNaN(volume) || isNaN(km) || km <= 0 || volume <= 0) {
                consumoMed.textContent = "Por favor, insira números válidos e maiores que zero.";
                return;
            }

            let consumoMedResultado = km / volume

            // Exibindo o resultado
            consumoMed.textContent = `A média de consumo: ${consumoMedResultado} km/L.`;
        }
        </script>
    </div>
</section>

<!--A empresa RAB paga os empregados por hora trabalhada. Para as primeiras 40 horas,
eles recebem normalmente. Após ultrapassar este limite (40 horas) o valor pago por
hora passa a ser três vezes maior. Na folha de pagamento é descontado R$ 1,50 para
cada refeição. Calcule e mostre o salário bruto, o valor do desconto da refeição e o
salário líquido de um funcionário que trabalhou 62 horas-->

<section>
    <h2>Folha de Pagamento - Empresa RAB</h2>
    <div>
        <!--legenda e entrada de dados com label-->
        <label for="valorHora">Valor da Hora Normal (R$): </label>
        <input type="number" id="valorHora" placeholder="Ex: 20">
        <br>
        <br>
        <label for="totalHoras">Total de Horas Trabalhadas: </label>
        <input type="number" id="totalHoras"  placeholder="Ex: 20h">
        <br>
        <br>
        <label for="numRefeicoes">Quantidade de Refeições: </label>
        <input type="number" id="numRefeicoes" placeholder="Ex: 3">

        <!--botão-->
        <input type="button" value="Calcular Folha" onclick="calcularFolha()">

        <div id="resultadoFolha" style="margin-top: 20px; line-height: 1.6;"></div>

        <!--função do botão-->
        <script>
        function calcularFolha() {
            let valorHoraNormal = Number(document.getElementById("valorHora").value);
            let horasTrabalhadas = Number(document.getElementById("totalHoras").value);
            let refeicoes = Number(document.getElementById("numRefeicoes").value);
            let elementoRes = document.getElementById("resultadoFolha");

            if (valorHoraNormal <= 0 || horasTrabalhadas <= 0) {
                elementoRes.textContent = "Por favor, preencha os valores corretamente.";
                return;
            }

            let salarioBruto = 0;
            let limiteNormal = 40;

            // Lógica do Salário Bruto
            // se horas for menor que limite = multiplica horas pelo valor da hora
            // se nao calcula as horas extras
            if (horasTrabalhadas <= limiteNormal) {
                salarioBruto = horasTrabalhadas * valorHoraNormal;
            } else {
                let horasExtras = horasTrabalhadas - limiteNormal; //horas extras
                let ganhoNormal = limiteNormal * valorHoraNormal; //ganho normal
                let ganhoExtra = horasExtras * (valorHoraNormal * 3); // Valor 3x maior
                salarioBruto = ganhoNormal + ganhoExtra; //salario bruto
            }

            // Descontos e Líquido
            let descontoRefeicao = refeicoes * 1.50; // refeição desconto
            let salarioLiquido = salarioBruto - descontoRefeicao; // salario com desconto

            // Exibição formatada
            elementoRes.innerHTML = `
                <div style="border: 1px solid #ccc; padding: 10px; background: #f9f9f9;">
                    <p><strong>Detalhamento:</strong></p>
                    <p>Salário Bruto: R$ ${salarioBruto.toFixed(2)}</p>
                    <p>Desconto Refeições: R$ ${descontoRefeicao}</p>
                    <hr>
                    <p><strong>Salário Líquido: R$ ${salarioLiquido}</strong></p>
                </div>
            `;
        }
        </script>
    </div>
</section>

<section>
    <h1>Número Aleatório!</h1>
    
    <!-- Alterado para <span> para exibir o número -->
    <label>Número randomizado: <span id="randomNumber">--</span></label>
    <br><br>    
    
    <input type="button" value="Gerar Número" onclick="gerarNumero()">
    <input type="reset" value="Reiniciar" onclick="zerarNumero()">

    <script>
        function gerarNumero() {
            // Define o intervalo
            const min = 1;
            const max = 100;
            
            // Gera um número inteiro aleatório entre min e max (inclusivos)
            let randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            
            // Exibe o resultado no <span> definido acima
            document.getElementById('randomNumber').innerText = randomNum;
        }
        function zerarNumero(){
            document.getElementById('randomNumber').innerText = '--';

        }
    </script>
</section>
